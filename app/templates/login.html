{% extends "base.html" %}

{% block head %}
<style>
    .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        position: relative;
        overflow: hidden;
    }
    .login-blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
    }
    .login-blob-1 {
        width: 400px; height: 400px;
        top: 10%; left: 15%;
        background: rgba(51,177,176,0.15);
    }
    .login-blob-2 {
        width: 300px; height: 300px;
        bottom: 15%; right: 10%;
        background: rgba(51,177,176,0.10);
    }
    .login-card {
        width: 100%;
        max-width: 420px;
        padding: 40px 36px;
        display: flex;
        flex-direction: column;
        gap: 24px;
        position: relative;
        z-index: 1;
    }
    .login-header {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
    }
    .login-logo {
        width: 60px; height: 60px;
        background: linear-gradient(135deg, #33B1B0, #2a9a99);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 8px 24px rgba(51,177,176,0.35);
    }
    .login-title {
        font-size: 1.75rem;
        font-weight: 700;
        color: #1a1a1a;
        margin: 0;
    }
    .login-subtitle {
        font-size: 0.9rem;
        color: rgba(60,61,63,0.6);
        margin: 0;
    }
    .login-form {
        display: flex;
        flex-direction: column;
        gap: 16px;
    }
    .login-hint {
        font-size: 0.78rem;
        color: rgba(60,61,63,0.5);
        text-align: center;
        border-top: 1px solid rgba(60,61,63,0.12);
        padding-top: 16px;
    }
    .login-hint code {
        background: rgba(51,177,176,0.08);
        border-radius: 4px;
        padding: 1px 5px;
        font-family: monospace;
        font-size: 0.78rem;
        color: #33B1B0;
    }
    .login-error {
        color: var(--danger);
        background: rgba(224,60,60,0.08);
        border: 1px solid rgba(224,60,60,0.2);
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 0.88rem;
        text-align: center;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-page">
    <!-- Background blobs -->
    <div class="login-blob login-blob-1"></div>
    <div class="login-blob login-blob-2"></div>

    <div class="glass-card login-card fade-in">
        <!-- Header -->
        <div class="login-header">
            <div class="login-logo">
                <img src="/static/favicon.svg" alt="ProdAI" style="height: 36px; width: auto; display: block; filter: brightness(10);">
            </div>
            <h1 class="login-title">Welcome Back</h1>
            <p class="login-subtitle">Sign in to your account to continue</p>
        </div>

        <!-- Form -->
        <form action="/login" method="POST" class="login-form">
            {% if error %}
            <div class="login-error fade-in">{{ error }}</div>
            {% endif %}

            <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label" for="email">Email Address</label>
                <input
                    id="email"
                    type="email"
                    name="email"
                    class="form-input"
                    placeholder="you@example.com"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label" for="password">Password</label>
                <input
                    id="password"
                    type="password"
                    name="password"
                    class="form-input"
                    placeholder="Enter your password"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
                Sign In
            </button>
        </form>

        <!-- Signup link -->
        <p class="login-footer" style="font-size: 0.88rem; color: rgba(60,61,63,0.7); text-align: center; margin: 0;">
            Don't have an account? <a href="/signup" style="color: var(--accent); font-weight: 600; text-decoration: none;">Create one</a>
        </p>

        <!-- Hint -->
        <p class="login-hint">
            Demo: <code>admin@plant.com</code> / <code>admin123</code>
        </p>
    </div>
</div>
{% endblock %}
