version: "3.9"

services:
  # ── AI/LLM backend (port 8000) ─────────────────────────────────────────────
  llm:
    build:
      context: ./llm
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./llm/.env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - app_uploads:/app/static/uploads
    restart: unless-stopped

  # ── Web dashboard (port 8080) ──────────────────────────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - LLM_API_URL=http://54.91.201.119:8000   # browser calls this directly
      - APP_PORT=8080
      - SECRET_KEY=change-me-in-production
      - DATABASE_URL=sqlite:////app/data/plant_dashboard_v2.db
    volumes:
      - app_data:/app/data
      - app_uploads:/app/static/uploads
      - ./data_ingestion:/data_ingestion:ro
    restart: unless-stopped

volumes:
  app_data:
  app_uploads:
