version: "3.9"

services:
  # ── Neo4j knowledge graph ──────────────────────────────────────────────────
  # Ports NOT exposed to host — only accessible inside Docker network.
  # To access Neo4j browser during debugging, use SSH tunnel:
  #   ssh -L 7474:localhost:7474 -L 7687:localhost:7687 ubuntu@<ec2-ip>
  #   Then open http://localhost:7474 in your local browser.
  neo4j:
    image: neo4j:5-community
    environment:
      - NEO4J_AUTH=neo4j/rcapassword          # CHANGE before production deploy
      # Conservative memory settings — safe for t3.medium (4 GB RAM)
      - NEO4J_server_memory_pagecache_size=256M
      - NEO4J_server_memory_heap_initial__size=256M
      - NEO4J_server_memory_heap_max__size=512M
    volumes:
      # Pinned to EC2 host path — data survives all container rebuilds
      - /opt/rca_data/neo4j:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── AI/LLM backend (port 8000) ─────────────────────────────────────────────
  llm:
    build:
      context: ./llm
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./llm/.env
    environment:
      - PYTHONUNBUFFERED=1
      # Neo4j — uses internal Docker hostname (not localhost) when running in Docker
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=rcapassword             # CHANGE to match neo4j service above
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      # HuggingFace model cache — avoids re-downloading on EC2 restarts
      - hf_cache:/root/.cache/huggingface
      - /opt/rca_data/uploads:/app/static/uploads

    restart: unless-stopped

  # ── Web dashboard (port 8080) ──────────────────────────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      # Lives on EC2 at /opt/rca_data/.env.production — never in Git.
      # Contains: SECRET_KEY, DATABASE_URL, LLM_API_URL
      - /opt/rca_data/.env.production
    environment:
      - APP_PORT=8080
    volumes:
      # Both paths pinned to EC2 host — data survives all container rebuilds
      - /opt/rca_data/db:/app/data
      - /opt/rca_data/uploads:/app/static/uploads
      # Mount data_ingestion read-only so the app can read extracted_data.json
      - ./data_ingestion:/data_ingestion:ro
    restart: unless-stopped

volumes:
  # hf_cache is still Docker-managed (HuggingFace models — safe to re-download)
  hf_cache: