version: "3.9"

services:
  # ── Neo4j knowledge graph (port 7474 browser / 7687 bolt) ─────────────────
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"   # Neo4j browser UI
      - "7687:7687"   # Bolt protocol (Python driver)
    environment:
      - NEO4J_AUTH=neo4j/rcapassword
      # Conservative memory settings — safe for t2.small (2 GB) EC2
      - NEO4J_server_memory_pagecache_size=256M
      - NEO4J_server_memory_heap_initial__size=256M
      - NEO4J_server_memory_heap_max__size=512M
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── AI/LLM backend (port 8000) ─────────────────────────────────────────────
  llm:
    build:
      context: ./llm
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./llm/.env
    environment:
      - PYTHONUNBUFFERED=1
      # Neo4j — uses internal Docker hostname (not localhost) when running in Docker
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=rcapassword
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - app_uploads:/app/static/uploads
      - hf_cache:/root/.cache/huggingface   # sentence-transformers model persists across restarts
    restart: unless-stopped

  # ── Web dashboard (port 8080) ──────────────────────────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - LLM_API_URL=http://54.91.201.119:8000   # browser calls this directly
      - APP_PORT=8080
      - SECRET_KEY=change-me-in-production
      - DATABASE_URL=sqlite:////app/data/plant_dashboard_v2.db
    volumes:
      - app_data:/app/data
      - app_uploads:/app/static/uploads
      - ./data_ingestion:/data_ingestion:ro
    restart: unless-stopped

volumes:
  app_data:
  app_uploads:
  neo4j_data:       # graph data persists across container restarts
  hf_cache:         # HuggingFace model cache — avoids re-downloading on EC2 restarts
